name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run full CI
        run: |
          npm run typecheck
          npm run lint
          npm run format:check
          npm run test:coverage

      - name: Build
        run: npm run build

      - name: Assert dist files exist
        run: |
          test -f dist/index.cjs || (echo "FAIL: dist/index.cjs missing" && exit 1)
          test -f dist/index.mjs || (echo "FAIL: dist/index.mjs missing" && exit 1)
          test -f dist/index.d.ts || (echo "FAIL: dist/index.d.ts missing" && exit 1)
          echo "PASS: all dist files present"

      - name: Publish with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}